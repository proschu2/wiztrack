<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5a2a5a"/>
      <stop offset="100%" style="stop-color:#3d1f3d"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Card suit -->
  <text x="256" y="280" font-size="200" text-anchor="middle" fill="#f4d03f">🎴</text>
  <!-- Text -->
  <text x="256" y="420" font-size="56" text-anchor="middle" fill="#ffffff" font-family="serif" font-weight="bold" filter="url(#shadow)">WIZTRACK</text>
</svg>